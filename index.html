<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Vouch Coverage Intelligence — Prototype</title>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
  :root {
    --vouch-dark: #0F1C2C;
    --vouch-light: #F5F2EE;            /* warm cream (was #F7FAF2) */
    --vouch-mint-cream: #F8FAF2;       /* pale mint cream — input fill, active row */
    --vouch-mint-wash: #E8F5EF;        /* selected-section wash */
    --vouch-plum: #3D2040;             /* Vouch plum — header avatar chip */
    --vouch-dark-green: #1A5745;
    --vouch-green: #3BE0AD;
    --vouch-text-green: #19A078;
    --vouch-yellow: #E8FC83;
    --vouch-blue: #50EAF2;
    --vouch-gray: #A8A8A8;
    --vouch-light-gray: #E8E4DE;       /* warm tan border (was #EBEAE8) */
    --tech-deep: #8F2A04;
    --tech-mid: #CA6233;
    --tech-light: #EDC2A2;
    --hls-deep: #4A1F5C;
    --hls-mid: #7A4FA5;
    --hls-light: #D6C6E6;
    --fs-deep: #1A3D75;
    --fs-mid: #326CA3;
    --fs-light: #C2D6EB;
    --ps-deep: #B5851B;
    --ps-mid: #E3A82B;
    --ps-light: #F6D98A;
  }
  html, body { background: var(--vouch-light); color: var(--vouch-dark); font-family: 'Inter', Arial, Helvetica, sans-serif; }
  .font-serif-brand { font-family: 'Fraunces', Georgia, serif; font-feature-settings: "ss01"; letter-spacing: -0.01em; }
  .vouch-mesh {
    background:
      radial-gradient(circle at 18% 12%, rgba(59,224,173,.30) 0%, transparent 38%),
      radial-gradient(circle at 88% 22%, rgba(80,234,242,.22) 0%, transparent 42%),
      radial-gradient(circle at 65% 92%, rgba(232,252,131,.30) 0%, transparent 36%),
      radial-gradient(circle at 12% 88%, rgba(26,87,69,.18) 0%, transparent 40%),
      var(--vouch-light);
  }
  .vouch-mesh-dark {
    background:
      radial-gradient(circle at 22% 18%, rgba(59,224,173,.35) 0%, transparent 40%),
      radial-gradient(circle at 82% 78%, rgba(80,234,242,.18) 0%, transparent 44%),
      radial-gradient(circle at 60% 12%, rgba(232,252,131,.10) 0%, transparent 30%),
      var(--vouch-dark);
  }
  .industry-tech { background: linear-gradient(135deg, var(--tech-light) 0%, transparent 60%); }
  .industry-hls  { background: linear-gradient(135deg, var(--hls-light)  0%, transparent 60%); }
  .industry-fs   { background: linear-gradient(135deg, var(--fs-light)   0%, transparent 60%); }
  .industry-ps   { background: linear-gradient(135deg, var(--ps-light)   0%, transparent 60%); }
  .pill {
    display: inline-flex; align-items: center; gap: .5rem;
    padding: .85rem 1.25rem; border-radius: 9999px;
    border: 1.5px solid var(--vouch-dark); background: var(--vouch-light);
    color: var(--vouch-dark); font-weight: 500; font-size: 0.95rem;
    transition: all .15s ease;
    cursor: pointer;
  }
  .pill:hover { background: var(--vouch-dark); color: var(--vouch-light); transform: translateY(-1px); }
  .pill.selected { background: var(--vouch-dark); color: var(--vouch-light); }
  .pill-chip {
    padding: .65rem 1rem; border-radius: 9999px;
    border: 1.5px solid var(--vouch-light-gray); background: var(--vouch-mint-cream);
    font-size: 0.9rem; cursor: pointer; transition: all .15s ease;
  }
  .pill-chip:hover { border-color: var(--vouch-dark); }
  .pill-chip.selected {
    background: var(--vouch-dark); color: var(--vouch-light);
    border-color: var(--vouch-dark);
  }
  .cta-primary {
    background: var(--vouch-green); color: var(--vouch-dark);
    padding: 1.1rem 2rem; border-radius: 9999px;
    font-weight: 600; font-size: 1.05rem; cursor: pointer;
    transition: all .15s ease; border: none;
    box-shadow: 0 1px 0 rgba(15,28,44,0.06);
  }
  .cta-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(59,224,173,0.35); }
  .cta-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }
  .cta-dark {
    background: var(--vouch-dark); color: var(--vouch-light);
    padding: 1.1rem 2rem; border-radius: 9999px;
    font-weight: 600; font-size: 1.05rem; cursor: pointer; border: none;
    transition: all .15s ease;
  }
  .cta-dark:hover { transform: translateY(-1px); }
  .cta-link {
    background: transparent; color: var(--vouch-dark);
    padding: .65rem 1rem; border: none; cursor: pointer;
    text-decoration: underline; font-size: .95rem;
  }
  .badge {
    display: inline-flex; align-items: center;
    padding: .25rem .65rem; border-radius: 9999px;
    font-size: .72rem; font-weight: 700; letter-spacing: .04em;
    text-transform: uppercase;
  }
  .badge-required { background: var(--vouch-dark); color: var(--vouch-light); }
  .badge-recommended { background: var(--vouch-green); color: var(--vouch-dark); }
  .badge-optional { background: var(--vouch-light-gray); color: #555; }
  .sublimit-chip {
    display: inline-block; margin: .15rem;
    padding: .2rem .55rem; border-radius: 6px;
    font-size: .7rem; font-weight: 500;
    background: #fff7d8; border: 1px solid #efe2a0; color: #6b5500;
  }
  .status-red { color: #B91C1C; }
  .status-yellow { color: #B45309; }
  .status-green { color: #15803D; }
  .status-cell-red    { background: #FEE2E2; color: #991B1B; }
  .status-cell-yellow { background: #FEF3C7; color: #92400E; }
  .status-cell-green  { background: #D1FAE5; color: #065F46; }
  .upload-zone {
    border: 2px dashed var(--vouch-dark);
    border-radius: 18px; padding: 3rem 2rem;
    background: rgba(255,255,255,.6);
    transition: all .2s ease;
  }
  .upload-zone.drag { background: rgba(59,224,173,.18); border-color: var(--vouch-text-green); }
  .progress-rail { height: 4px; background: var(--vouch-light-gray); border-radius: 9999px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--vouch-dark); transition: width .3s ease; }
  .why-link { font-size: .85rem; color: var(--vouch-text-green); text-decoration: underline; cursor: pointer; }
  .why-box { font-size: .85rem; color: #555; padding: .65rem .9rem; background: rgba(80,234,242,.12); border-radius: 8px; margin-top: .5rem; }
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
  .anim-fade { animation: fadeIn .35s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .anim-spin { animation: spinAround 1.4s linear infinite; }
  @keyframes spinAround { to { transform: rotate(360deg); } }
  .pulse-dot { animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: .4; } 50% { opacity: 1; } }
  .card { background: #fff; border: 1px solid var(--vouch-light-gray); border-radius: 18px; padding: 1.5rem; }
  .card-elevated { background: #fff; border: 1px solid var(--vouch-light-gray); border-radius: 22px; padding: 1.75rem; box-shadow: 0 1px 0 rgba(15,28,44,0.04); }
  .input-base {
    width: 100%; padding: .85rem 1rem; border: 1.5px solid var(--vouch-light-gray);
    border-radius: 12px; font-size: .98rem; background: var(--vouch-mint-cream); color: var(--vouch-dark);
    font-family: inherit;
  }
  .input-base:focus { outline: none; border-color: var(--vouch-dark); background: #fff; }
  /* Card-stack form pattern (Q4 / Q6) — mhtml-derived */
  .form-card {
    background: #fff; border: 1px solid var(--vouch-light-gray);
    border-radius: 12px; padding: 24px 28px; margin-bottom: 16px;
  }
  .form-card-title { font-weight: 600; font-size: 14px; color: #1a1a1a; margin-bottom: 12px; }
  .form-card-help  { font-size: 13px; color: #6b7280; margin: 4px 0 12px; line-height: 1.5; }
  .cta-primary-wide {
    width: 100%; padding: 13px 0; border-radius: 8px; border: none;
    background: var(--vouch-green); color: var(--vouch-dark);
    font-weight: 600; font-size: 14px; cursor: pointer;
    transition: filter .15s ease;
  }
  .cta-primary-wide:hover:not(:disabled) { filter: brightness(0.96); }
  .cta-primary-wide:disabled { opacity: .45; cursor: not-allowed; }
  /* Quiz sidebar checklist — mhtml-derived */
  .quiz-sidebar {
    width: 240px; flex-shrink: 0;
    background: var(--vouch-mint-cream);
    border-right: 1px solid var(--vouch-light-gray);
    padding: 28px 0 32px;
  }
  .quiz-sidebar-progress {
    padding: 0 24px 16px; border-bottom: 1px solid var(--vouch-light-gray); margin-bottom: 8px;
  }
  .quiz-sidebar-rail { height: 6px; background: #DDD8D0; border-radius: 99px; overflow: hidden; }
  .quiz-sidebar-fill { height: 100%; background: var(--vouch-green); border-radius: 99px; transition: width .35s ease; }
  .quiz-sidebar-item {
    width: 100%; text-align: left; padding: 10px 24px;
    border: none; background: transparent; cursor: pointer;
    display: flex; align-items: center; gap: 12px;
    font-size: 14px; font-weight: 500; color: #3F4956;
    transition: background .15s ease;
  }
  .quiz-sidebar-item:hover { background: var(--vouch-mint-wash); }
  .quiz-sidebar-item.is-current { background: var(--vouch-mint-wash); font-weight: 600; }
  .quiz-sidebar-item:disabled { cursor: not-allowed; opacity: .55; }
  .quiz-sidebar-circle {
    width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid #C4BDB4; background: transparent;
    display: flex; align-items: center; justify-content: center;
  }
  .quiz-sidebar-circle.is-done { background: #00A878; border-color: #00A878; }
  .quiz-sidebar-circle.is-current { border-color: var(--vouch-text-green); }
  /* Plum avatar chip — header right-side */
  .plum-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--vouch-plum); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; letter-spacing: .02em;
  }
  .label { font-size: .8rem; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: var(--vouch-dark); margin-bottom: .35rem; display: block; }
  .scrollable { overflow-y: auto; max-height: 100vh; }
  /* Yellow highlight for single-word emphasis in headlines */
  .hl-yellow { background: var(--vouch-yellow); padding: 0 .25em; border-radius: 3px; }
</style>
</head>

<div id="root"></div>

<script type="text/babel" data-type="module" data-presets="env,react">
const { useState, useMemo, useEffect, useRef } = React;

// ============================================================
//  BRAND + INDUSTRY MAP
// ============================================================
const INDUSTRY_KEYS = {

// ============================================================
//  Q1 / Q2 — INDUSTRY + SUB-VERTICAL OPTIONS
// ============================================================
const SUBVERTICALS = {

    "AI", "SaaS", "DevTools", "Hardware", "eCommerce",
    "Fintech — Lending", "Fintech — Payments / BaaS", "Fintech — RIA / Asset Mgmt",

// ============================================================

const SIZE_OPTIONS_TECH = [
  { key: "seed",   label: "Seed / Bootstrapped (<$5M)",      doLimit: "$1M" },
  { key: "a",      label: "Series A ($5M–$25M raised)",       doLimit: "$2M" },
  { key: "b",      label: "Series B ($25M–$50M)",             doLimit: "$3M" },
  { key: "c",      label: "Series C ($50M–$250M)",            doLimit: "$5M" },
  { key: "growth", label: "Growth ($250M+)",                  doLimit: "$5M (up to $10M)" },
];
const SIZE_OPTIONS_NONTECH = [
  { key: "<1",   label: "<$1M",         doLimit: "$1M" },
  { key: "1-5",  label: "$1M–$5M",      doLimit: "$1M" },
  { key: "5-25", label: "$5M–$25M",     doLimit: "$2M" },
  { key: "25-100", label: "$25M–$100M", doLimit: "$3M" },
  { key: "100+", label: "$100M+",       doLimit: "$5M" },
];

// ============================================================
//  Q4 — HEADCOUNT + WORKFORCE FLAGS
// ============================================================
const HEADCOUNT_OPTIONS = ["2–10", "11–50", "51–200", "200+"];
const WORKFORCE_FLAGS = [
  { key: "ca",  label: "Workforce concentrated in California" },
  { key: "il",  label: "Workforce concentrated in Illinois, Texas, or Washington" },
  { key: "ny",  label: "Workforce concentrated in New York" },
  { key: "cust",label: "Customer-facing in person (retail / healthcare / hospitality / education / transportation)" },
  { key: "bio", label: "Use fingerprint, palm, or face-scan timeclocks" },
];

// ============================================================
//  Q5 — BUSINESS PROFILE FLAGS
// ============================================================
const PROFILE_FLAGS = [
  { key: "enterprise", label: "Enterprise contracts ($100K+ deals)" },
  { key: "smb",        label: "SMB or consumer customers" },
  { key: "sensitive",  label: "Hold or process sensitive data — health records, cardholder data, or 10K+ consumer PII" },
  { key: "funds",      label: "Hold client funds, escrow, or trust accounts" },
  { key: "wires",      label: "Initiate wires or ACH at scale (regularly pay vendors, send domestic or international wires)" },
  { key: "crypto",     label: "Hold cryptocurrency or digital assets" },
  { key: "none",       label: "None of the above" },
];

// ============================================================
//  Q6 — INDUSTRY-TAILORED TRIGGERS
// ============================================================
const TRIGGER_OPTIONS = {
  Technology: [
    { key: "fundraise", label: "Fundraise" },
    { key: "ma",        label: "M&A / sale" },
    { key: "rif",       label: "Layoff or RIF" },
    { key: "token",     label: "Token launch / foundation setup" },
    { key: "401k5",     label: "401(k) with $5M+ assets" },
    { key: "selffunded",label: "Self-funded health plan" },
    { key: "esop",      label: "ESOP / employer stock in 401(k)" },
    { key: "none",      label: "None" },
  ],
  "Financial Services": [
    { key: "newfund",   label: "New fund close or vintage" },
    { key: "exam",      label: "SEC / FINRA / state regulatory exam" },
    { key: "ma",        label: "M&A / sale" },
    { key: "rif",       label: "Layoff or RIF" },
    { key: "401k5",     label: "401(k) with $5M+ assets" },
    { key: "selffunded",label: "Self-funded health plan" },
    { key: "none",      label: "None" },
  ],
  "Professional Services": [
    { key: "partner",   label: "New partner or major hire" },
    { key: "bigcontract", label: "Large new contract win" },
    { key: "ma",        label: "M&A / sale" },
    { key: "rif",       label: "Layoff or RIF" },
    { key: "401k5",     label: "401(k) with $5M+ assets" },
    { key: "selffunded",label: "Self-funded health plan" },
    { key: "none",      label: "None" },
  ],
  "Healthcare & Life Sciences": [
    { key: "clinical",  label: "Clinical milestone or FDA submission" },
    { key: "launch",    label: "Commercial launch" },
    { key: "fundraise", label: "Fundraise" },
    { key: "ma",        label: "M&A / sale" },
    { key: "rif",       label: "Layoff or RIF" },
    { key: "401k5",     label: "401(k) with $5M+ assets" },
    { key: "selffunded",label: "Self-funded health plan" },
    { key: "none",      label: "None" },
  ],
};

// ============================================================
//  COVERAGE MATRIX — base set per sub-vertical
//  Each entry: { name, what, defaultPriority, limit, key }
//  Q3-Q6 mutate via the snapshot engine.
// ============================================================
const REQ = "Required";
const REC = "Strongly Recommended";
const OPT = "Optional";
const FROM_Q3 = "FROM_Q3";

// reusable coverage definitions
const COV = {
  techEO: (limit, what) => ({ key: "techEO", name: "Tech E&O", what: what || "Covers claims that your software, platform, or technical service caused a customer financial loss.", defaultPriority: REQ, limit }),
  cyber:  (limit, what) => ({ key: "cyber",  name: "Cyber Liability", what: what || "Pays for breach response, ransomware, regulatory penalties, and business interruption from a cyber event.", defaultPriority: REQ, limit }),
  do:     ()           => ({ key: "do",     name: "Directors & Officers (D&O)", what: "Defends and indemnifies your board and executives for management decisions, financial disclosures, and investor disputes.", defaultPriority: FROM_Q3, limit: FROM_Q3 }),
  gl:     (limit)      => ({ key: "gl",     name: "General Liability", what: "Covers third-party bodily injury, property damage, and personal injury arising from your operations.", defaultPriority: REC, limit }),
  epli:   (limit)      => ({ key: "epli",   name: "Employment Practices Liability (EPLI)", what: "Covers wrongful termination, harassment, discrimination, and wage & hour claims from employees.", defaultPriority: REC, limit }),
  crime:  (limit)      => ({ key: "crime",  name: "Crime", what: "Pays for losses from employee theft, social engineering, funds transfer fraud, and forgery.", defaultPriority: REC, limit }),
  fid:    ()           => ({ key: "fid",    name: "Fiduciary Liability", what: "Defends sponsors and administrators of retirement and benefit plans against ERISA breach claims.", defaultPriority: OPT, limit: "$1M–$2M" }),
  prodlia:(limit)      => ({ key: "prodlia",name: "Product Liability", what: "Covers bodily injury or property damage caused by a physical product you manufacture or sell.", defaultPriority: REQ, limit }),
  prof:   (limit, what)=> ({ key: "prof",   name: "Professional Liability", what: what || "Covers claims that your professional advice or services caused a customer financial loss.", defaultPriority: REQ, limit }),
  ia_eo:  (limit)      => ({ key: "ia_eo",  name: "Investment Advisor E&O", what: "Specialty E&O for RIA / fund management activity — claims tied to investment advice and discretionary trading.", defaultPriority: REQ, limit }),
  lend:   (limit)      => ({ key: "lend",   name: "Lenders Liability", what: "Specialty E&O for lending activity — covers claims arising from loan origination, servicing, and collections.", defaultPriority: REQ, limit }),
  ins_eo: (limit)      => ({ key: "ins_eo", name: "Insurance Services E&O", what: "Specialty E&O for MGA / agent activity — covers errors in placement, binding, or insurance advice.", defaultPriority: REQ, limit }),
  re_eo:  (limit)      => ({ key: "re_eo",  name: "Real Estate Activities E&O", what: "Specialty E&O for real estate brokerage, property management, or holding tenant funds.", defaultPriority: REQ, limit }),
  fid_im: (limit)      => ({ key: "fid_im", name: "Fiduciary Liability — Investment Management", what: "Covers the fiduciary duty owed to LPs and clients of an asset manager or RIA.", defaultPriority: REQ, limit }),
  fid_erisa: (limit)   => ({ key: "fid_erisa", name: "Fiduciary Liability — ERISA Plans", what: "Covers fiduciary duty for the firm's own retirement and benefit plans (ERISA).", defaultPriority: REQ, limit }),
  wc:     (limit)      => ({ key: "wc",     name: "Workers' Compensation", what: "Statutory employer coverage for workplace injury and illness.", defaultPriority: REQ, limit }),
};

// Per-sub-vertical base set
const BASE_MATRIX = {
  // ======= TECHNOLOGY =======
  "AI":            [COV.techEO("$1M–$2M (CEM shared)"), COV.cyber("$1M–$2M (CEM shared)"), COV.do(), COV.gl("$1M"), COV.epli("$1M–$2M"), COV.crime("$1M"), COV.fid()],
  "SaaS":          [COV.techEO("$1M–$2M (CEM shared)"), COV.cyber("$1M–$2M (CEM shared)"), COV.do(), COV.gl("$1M"), COV.epli("$1M–$2M"), COV.crime("$1M"), COV.fid()],
  "DevTools":      [COV.techEO("$1M–$2M (CEM shared)"), COV.cyber("$1M–$2M (CEM shared)"), COV.do(), COV.gl("$1M"), COV.epli("$1M–$2M"), COV.crime("$1M"), COV.fid()],
  "eCommerce":     [COV.techEO("$1M–$2M (CEM shared)"), COV.cyber("$1M–$2M (CEM shared)"), COV.do(), COV.gl("$1M"), COV.epli("$1M–$2M"), COV.crime("$1M"), COV.fid()],
  "Hardware":      [COV.techEO("$1M–$2M (CEM shared)"), COV.cyber("$1M–$2M"), COV.do(), COV.gl("$2M"), COV.epli("$1M–$2M"), COV.prodlia("$2M–$5M"), COV.crime("$1M"), COV.fid()],
  "Fintech — Lending":           [COV.techEO("$2M"), COV.cyber("$2M–$5M"), COV.do(), COV.gl("$1M"), COV.epli("$1M–$2M"), COV.crime("$1M–$2M"), COV.lend("$2M"), COV.fid()],

// ============================================================
//  D&O SIZING LOOKUP
// ============================================================
function getDoLimit(industry, sizeKey) {
  if (industry === INDUSTRY_KEYS.TECH) {
    const t = SIZE_OPTIONS_TECH.find(s => s.key === sizeKey);
    return t ? t.doLimit : "$1M";
  }
  const n = SIZE_OPTIONS_NONTECH.find(s => s.key === sizeKey);
  return n ? n.doLimit : "$1M";
}
function getSizeLabel(industry, sizeKey) {
  const opts = industry === INDUSTRY_KEYS.TECH ? SIZE_OPTIONS_TECH : SIZE_OPTIONS_NONTECH;
  const o = opts.find(s => s.key === sizeKey);
  return o ? o.label : "";
}
function getSizeShortLabel(industry, sizeKey) {
  if (industry === INDUSTRY_KEYS.TECH) {
    const map = { seed: "Seed", a: "Series A", b: "Series B", c: "Series C", growth: "Growth" };
    return map[sizeKey] || "";
  }
  const map = { "<1": "<$1M", "1-5": "$1M–$5M", "5-25": "$5M–$25M", "25-100": "$25M–$100M", "100+": "$100M+" };
  return map[sizeKey] || "";
}

// ============================================================
//  SNAPSHOT COMPUTATION ENGINE
//  Implements the 7-step results computation logic from the PRD:
//    1. Base coverage set for sub-vertical (Q2)
//    2. D&O limit from Q3
//    3. EPL endorsements from Q4
//    4. Cyber/E&O/Crime priorities + sublimits from Q5 + Q2
//    5. Fiduciary status from Q6 (plan triggers)
//    6. Trigger-event flags from Q6 onto summary + sales brief
//    7. Personalized "Why this applies to you" per coverage
// ============================================================
function computeSnapshot(a) {
  const { industry, subVertical, size, headcount, workforceFlags, profileFlags, triggers } = a;
  if (!industry || !subVertical || !size) return null;
  const baseSet = (BASE_MATRIX[subVertical] || []).map(c => ({
    ...c,
    priority: c.defaultPriority,
    limit: c.limit,
    sublimits: [],
    why: "",
  }));
  const doLimit = getDoLimit(industry, size);

  const headcountIdx = HEADCOUNT_OPTIONS.indexOf(headcount);
  const has11plus = headcountIdx >= 1;
  const has51plus = headcountIdx >= 2;
  const wf = new Set(workforceFlags || []);
  const pf = new Set(profileFlags || []);
  const tr = new Set(triggers || []);

  const findCov = (key) => baseSet.find(c => c.key === key);
  const promoteTo = (cov, level) => {
    if (!cov) return;
    const order = { [OPT]: 0, [REC]: 1, [REQ]: 2 };
    if (order[level] > order[cov.priority]) cov.priority = level;
  };

  // Step 2 — D&O limit & priority from Q3
  const doCov = findCov("do");
  if (doCov) {
    doCov.limit = doLimit;
    if (doCov.priority === FROM_Q3) doCov.priority = REC;
    if (industry === INDUSTRY_KEYS.FS) doCov.priority = REQ;
    if (industry === INDUSTRY_KEYS.HLS) doCov.priority = REQ;
    if (industry === INDUSTRY_KEYS.TECH) {
      // Series A+ implies funded → D&O Required; Seed → Recommended
      doCov.priority = (size === "seed") ? REC : REQ;
    }
    if (size === "seed" || size === "<1" || size === "1-5") {
      // keep small but still flag
      if (doCov.priority !== REQ) doCov.priority = REC;
    }
  }

  // Step 3 — EPL endorsements from Q4
  const epli = findCov("epli");
  if (epli) {
    if (has11plus) promoteTo(epli, REQ);
    if (wf.has("ca")) epli.sublimits.push("Sublimit: Wage & hour defense — $250K");
    if (wf.has("il") && wf.has("bio")) epli.sublimits.push("Endorsement: BIPA / biometric privacy");
    else if (wf.has("bio")) epli.sublimits.push("Endorsement: Biometric privacy");
    if (wf.has("cust")) epli.sublimits.push("Endorsement: Third-party discrimination");
    if (wf.has("ny")) epli.sublimits.push("Note: NY State pay-equity / anti-harassment exposure");
  }
  // Workers' comp implication for 11+ / 51+
  const hasWC = !!findCov("wc");
  if (has11plus && !hasWC) {
    baseSet.push({
      ...COV.wc("Statutory"),
      priority: has51plus ? REQ : REC,
      sublimits: [],
      why: "",
    });
  }

  // Step 4 — Cyber / E&O / Crime priorities + sublimits from Q5 + Q2
  const cyber = findCov("cyber");
  const techEO = findCov("techEO");
  const crime = findCov("crime");

  if (pf.has("sensitive")) {
    if (cyber) {
      promoteTo(cyber, REQ);
      cyber.limit = "$2M–$5M";
      cyber.sublimits.push("Sublimit: PCI penalties");
      cyber.sublimits.push("Sublimit: Privacy regulatory liability");
      if (subVertical === "HealthTech" || industry === INDUSTRY_KEYS.HLS) {
        cyber.sublimits.push("Sublimit: HIPAA penalty — $1M target");
      }
    }
  }
  if (pf.has("enterprise")) {
    if (techEO) {
      promoteTo(techEO, REQ);
      techEO.sublimits.push("CEM shared-aggregate flag — separate-tower negotiation if contract requires $5M cyber + $5M E&O");
    }
  }
  if (pf.has("funds")) {
    if (crime) { promoteTo(crime, REQ); crime.sublimits.push("Coverage: Client property"); }
  }
  if (pf.has("wires")) {
    if (crime) {
      promoteTo(crime, REQ);
      crime.sublimits.push("Recommend: Social engineering at full primary limit");
      crime.sublimits.push("Recommend: Funds transfer fraud at full primary limit");
    }
  }
  if (pf.has("crypto")) {
    if (crime) {
      promoteTo(crime, REQ);
      crime.sublimits.push("Endorsement: Cryptocurrency / digital asset (default forms exclude)");
    }
  }

  // AI sub-vertical → Tech E&O AI carve-back if sensitive data or enterprise
  if (subVertical === "AI") {
    if (techEO) {
      techEO.sublimits.push("Carve-back: AI model output / hallucinations / training data");
    }
  }

  // Step 5 — Fiduciary status from Q6 plan triggers
  const fid = findCov("fid");
  if (fid && (tr.has("401k5") || tr.has("selffunded") || tr.has("esop"))) {
    fid.priority = REQ;
    if (tr.has("selffunded")) fid.sublimits.push("Sublimit: HIPAA penalty — $1M target");
    if (tr.has("esop")) fid.sublimits.push("Coverage: Employer-securities / ESOP");
    if (tr.has("401k5")) fid.sublimits.push("Coverage: Excessive-fee litigation at full limit");
  }

  // Step 6 — Trigger-event flags surface on summary
  const triggerNotes = [];
  if (tr.has("fundraise")) {
    if (doCov) {
      promoteTo(doCov, REQ);
      doCov.sublimits.push("Pre-negotiate: 6-year ERP at policy inception");
    }
    triggerNotes.push("fundraise");
  }
  if (tr.has("ma")) {
    triggerNotes.push("M&A");
    if (doCov) doCov.sublimits.push("Flag: Runoff / ERP for D&O / EPL / Fiduciary");
  }
  if (tr.has("rif")) {
    triggerNotes.push("RIF");
    if (epli) { promoteTo(epli, REQ); epli.sublimits.push("Flag: WARN Act exclusion scope review"); }
  }
  if (tr.has("token")) {
    triggerNotes.push("token launch");
    if (crime) crime.sublimits.push("Endorsement: Crypto / digital asset");
  }
  if (tr.has("exam")) {
    triggerNotes.push("regulatory exam");
    if (doCov) doCov.sublimits.push("Coverage: Regulatory defense scope");
  }
  if (tr.has("bigcontract")) {
    triggerNotes.push("large contract win");
    const profCov = findCov("prof");
    if (profCov) profCov.sublimits.push("Recommend: E&O limit lift to $2M");
  }
  if (tr.has("clinical")) triggerNotes.push("clinical / FDA milestone");
  if (tr.has("launch")) triggerNotes.push("commercial launch");

  // Step 7 — Personalized "Why this applies to you"
  baseSet.forEach(c => {
    c.why = generateWhy(c, a);
  });

  // Header + summary
  const header = formatHeader(industry, subVertical, size);
  const summary = formatSummary(a, triggerNotes);

  // Industry tone class
  const tone = INDUSTRY_TONE[industry] || {};

  return {
    header,
    summary,
    coverages: baseSet.filter(c => c.priority !== FROM_Q3),
    industryClass: tone.className || "",
    industry,
    subVertical,
    triggerNotes,
  };
}

function generateWhy(cov, a) {
  const { industry, subVertical, size, profileFlags, headcount, triggers } = a;
  const pf = new Set(profileFlags || []);
  const tr = new Set(triggers || []);
  switch (cov.key) {
    case "techEO":
      if (pf.has("enterprise")) return `Your enterprise contracts will require E&O at material limits — and likely a CEM separate-tower if buyers require $5M cyber + $5M E&O.`;
      if (subVertical === "AI") return `AI products attract claims tied to model output, hallucinations, and training data — carve-back is non-negotiable.`;
      return `Software platform exposure — covers customer financial loss tied to your tech.`;
    case "cyber":
      if (pf.has("sensitive") && industry === INDUSTRY_KEYS.HLS) return `PHI is the highest-cost data class — $60–$150 per record on a breach. HIPAA + BAA scope matters.`;
      if (pf.has("sensitive")) return `You hold sensitive data; per-record breach costs and regulatory exposure justify higher limits and PCI / privacy sublimits.`;
      return `Standard cyber exposure — breach response, ransomware, and BI lurk in every modern company.`;
    case "do":
      if (tr.has("fundraise")) return `You're raising — D&O is investor table-stakes, and a 6-year ERP should be pre-negotiated at this policy inception.`;
      if (industry === INDUSTRY_KEYS.FS) return `LP / investor scrutiny and regulatory exposure make D&O foundational at your size.`;
      return `Board, investor, and management decisions need defense and indemnification at this stage.`;
    case "gl":
      if (subVertical.startsWith("AEC")) return `Site work raises bodily-injury and property exposure — limit lift recommended.`;
      return `Premises and operations exposure — required by most landlords and customer contracts.`;
    case "epli":
      if (tr.has("rif")) return `Layoffs trigger WARN Act and discrimination exposure — confirm the WARN Act exclusion scope.`;
      if (headcount === "200+") return `At 200+ employees, EPL claim frequency steps up materially. Wage & hour defense is the biggest line item.`;
      return `Employees mean EPL claims — wrongful termination, discrimination, harassment, and wage & hour.`;
    case "crime":
      if (pf.has("wires")) return `Wire and ACH activity puts social engineering and FTF in scope — at primary limit, not the default $250K sublimit.`;
      if (pf.has("crypto")) return `Crypto/digital-asset losses are excluded by default. Endorsement is required.`;
      if (pf.has("funds")) return `Holding client funds drives Crime to Required and adds client-property scope.`;
      return `Treasury and AP activity make Crime exposure non-trivial — even small finance teams face FTF and BEC.`;
    case "fid":
      if (tr.has("selffunded")) return `Self-funded health plan adds HIPAA penalty exposure — sublimit to $1M.`;
      if (tr.has("esop")) return `ESOP / employer stock in 401(k) raises Department of Labor scrutiny — needs employer-securities scope.`;
      if (tr.has("401k5")) return `$5M+ in plan assets crosses the excessive-fee litigation threshold — coverage at full limit, not sublimited.`;
      return `Sponsoring a retirement or benefit plan is fiduciary work — defense costs alone justify it.`;
    case "fid_im":
      return `You owe LPs and clients a fiduciary duty on the fund itself — separate from ERISA exposure on your own plans.`;
    case "fid_erisa":
      return `Your firm's own retirement and benefit plans need ERISA fiduciary coverage — distinct from the investment-management side.`;
    case "ia_eo":
      return `RIA / fund management activity attracts claims tied to investment advice — specialty E&O is required.`;
    case "lend":
      return `Lending activity attracts claims that primary E&O typically excludes — you need Lenders Liability.`;
    case "ins_eo":
      return `MGA / agent activity needs Insurance Services E&O — primary E&O carves it out.`;
    case "re_eo":
      return `Brokering / managing real estate or holding tenant funds requires Real Estate Activities E&O.`;
    case "prodlia":
      return `Physical product = product-liability exposure for bodily injury and property damage.`;
    case "prof":
      if (subVertical.includes("Cybersecurity")) return `vCISO / advisory work is professional services exposure — separate from Tech E&O.`;
      if (industry === INDUSTRY_KEYS.PS) return `Your client deliverables and advice can result in financial loss claims — primary professional E&O is foundational.`;
      return `Professional advice / patient-care activity attracts claims that GL and Tech E&O don't pick up.`;
    case "wc":
      return `Required by statute when you have employees — even one in most states.`;
    default:
      return "Recommended for this profile.";
  }
}

function formatHeader(industry, subVertical, size) {
  const sizeShort = getSizeShortLabel(industry, size);
  if (industry === INDUSTRY_KEYS.TECH) return `${sizeShort} ${subVertical} Coverage Snapshot`;
  if (industry === INDUSTRY_KEYS.FS)   return `${sizeShort} Revenue ${subVertical} Coverage Snapshot`;
  if (industry === INDUSTRY_KEYS.PS)   return `${sizeShort} Revenue ${subVertical} Coverage Snapshot`;
  if (industry === INDUSTRY_KEYS.HLS) {
    if (subVertical === "HealthTech") return `${sizeShort} Revenue HealthTech Coverage Snapshot`;
    return `${subVertical.replace("Life Sciences — ", "")} Coverage Snapshot`;
  }
  return `${subVertical} Coverage Snapshot`;
}

function formatSummary(a, triggerNotes) {
  const { industry, subVertical, size, headcount, profileFlags } = a;
  const sizeShort = getSizeShortLabel(industry, size);
  const pf = new Set(profileFlags || []);
  const profileBits = [];
  if (pf.has("enterprise")) profileBits.push("enterprise contracts");
  if (pf.has("smb")) profileBits.push("SMB / consumer customers");
  if (pf.has("sensitive")) profileBits.push("handling sensitive data");
  if (pf.has("funds")) profileBits.push("holding client funds");
  if (pf.has("wires")) profileBits.push("running wires / ACH at scale");
  if (pf.has("crypto")) profileBits.push("holding crypto");
  const profileStr = profileBits.length ? `, ${profileBits.join(", ")}` : "";
  const headcountStr = headcount ? `, ${headcount} employees` : "";

  const baseLine = `Based on your profile — ${sizeShort} ${subVertical} company${headcountStr}${profileStr} — here are the coverages we recommend.`;

  if (!triggerNotes.length) return baseLine;
  const triggerLine = (() => {
    if (triggerNotes.includes("fundraise")) return ` Your highest-leverage move right now is pre-negotiating a 6-year ERP on your D&O before the round closes.`;
    if (triggerNotes.includes("M&A")) return ` Your M&A activity changes the runoff / ERP picture across D&O, EPL, and Fiduciary — flag these on the call.`;
    if (triggerNotes.includes("RIF")) return ` Your upcoming layoff puts WARN Act exposure on EPL — make sure the exclusion scope is reviewed.`;
    if (triggerNotes.includes("clinical / FDA milestone")) return ` Your clinical milestone shifts product-liability and clinical-trials coverage to top priority.`;
    if (triggerNotes.includes("commercial launch")) return ` Your commercial launch elevates product liability and patient-care professional liability to the top of the stack.`;
    if (triggerNotes.includes("regulatory exam")) return ` Your upcoming regulatory exam means the D&O regulatory-defense scope deserves a fresh read.`;
    if (triggerNotes.includes("token launch")) return ` Your token / foundation launch needs coordinated D&O foundation-entity coverage with crime crypto endorsement.`;
    return ` Your near-term events shape the priority list — we've flagged each on the snapshot.`;
  })();
  return baseLine + triggerLine;
}

              <h2 className="font-serif-brand text-[1.7rem] md:text-[2.1rem] font-semibold leading-tight">

              </h2>
              <p className="mt-2 text-[#F7FAF2]/80 text-[.98rem]">

// ============================================================
//  PATH B — UPLOAD
// ============================================================
function UploadScreen({ onUploaded, onBack, onReset, formData }) {
  const [drag, setDrag] = useState(false);
  const [filename, setFilename] = useState("");
  const fileRef = useRef(null);

  const accept = (file) => {
    if (!file) return;
    setFilename(file.name);
    setTimeout(() => onUploaded(file.name), 600);
  };

  return (
    <div className="vouch-mesh min-h-screen">
      <VouchHeader onReset={onReset} formData={formData} />
      <div className="max-w-3xl mx-auto px-6 py-12 md:py-16 anim-fade">
        <div className="text-xs tracking-widest uppercase text-[#19A078] font-semibold mb-4">
          Step 2 of 2 — upload your policy
        </div>
        <h2 className="font-serif-brand text-[2.1rem] md:text-[2.7rem] leading-tight font-semibold text-[#0F1C2C]">
          Drop your current policy.
        </h2>
        <p className="mt-3 text-[1.02rem] text-[#0F1C2C]/75 max-w-xl">
          PDF works best. We'll grade each line against Vouch's rubric — sublimits, exclusions, and form-language gaps your broker probably never read out loud.
        </p>

        <div
          className={`upload-zone mt-8 text-center cursor-pointer ${drag ? "drag" : ""}`}
          onDragOver={e => { e.preventDefault(); setDrag(true); }}
          onDragLeave={() => setDrag(false)}
          onDrop={e => {
            e.preventDefault(); setDrag(false);
            const f = e.dataTransfer.files?.[0]; if (f) accept(f);
          }}
          onClick={() => fileRef.current?.click()}
        >
          <input
            ref={fileRef}
            type="file"
            accept="application/pdf,image/*"
            className="hidden"
            onChange={e => accept(e.target.files?.[0])}
          />
          <div className="font-serif-brand text-[1.3rem] font-semibold text-[#0F1C2C]">
            {filename ? `Uploaded: ${filename}` : "Drop your policy here"}
          </div>
          <div className="mt-1 text-[.9rem] text-[#0F1C2C]/70">
            or click to choose a file · PDF or image · max ~25MB
          </div>
          <div className="mt-5">
            <span className="cta-primary inline-block">Choose file</span>
          </div>
        </div>

        <div className="mt-6 grid grid-cols-1 md:grid-cols-3 gap-3 text-[.85rem]">
          <div className="card-elevated">
            <div className="font-semibold mb-1">Encrypted in transit</div>
            <div className="text-[#0F1C2C]/70">PII and beneficial-owner info stay private.</div>
          </div>
          <div className="card-elevated">
            <div className="font-semibold mb-1">No obligation</div>
            <div className="text-[#0F1C2C]/70">A scorecard, not a quote. Switching brokers is your call.</div>
          </div>
          <div className="card-elevated">
            <div className="font-semibold mb-1">Specialist review</div>
            <div className="text-[#0F1C2C]/70">Routed to a sub-vertical expert — not a generalist.</div>
          </div>
        </div>

        <div className="mt-10 flex items-center justify-between">
          <button className="cta-link" onClick={onBack}>← Back</button>
          <div className="text-[.7rem] text-[#A8A8A8] max-w-sm text-right">
            Prototype: filename is captured but the file isn't actually parsed. The scorecard is pre-canned demo data.
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
//  PATH B — PROCESSING
// ============================================================
function ProcessingScreen({ onDone, filename }) {
  const [tick, setTick] = useState(0);
  const phases = [
    "Parsing policy declarations…",
    "Extracting limits, sublimits, and endorsement schedule…",
    "Reading exclusions and form-language carve-backs…",
    "Grading against Vouch's coverage rubric…",
    "Compiling red / yellow / green scorecard…",
  ];
  useEffect(() => {
    if (tick >= phases.length) { onDone(); return; }
    const t = setTimeout(() => setTick(tick + 1), 1400);
    return () => clearTimeout(t);
    // eslint-disable-next-line
  }, [tick]);

  return (
    <div className="vouch-mesh min-h-screen">
      <div className="max-w-2xl mx-auto px-6 py-24 anim-fade text-center">
        <div className="inline-block w-14 h-14 rounded-full border-4 border-[#3BE0AD] border-t-transparent anim-spin" />
        <h2 className="mt-8 font-serif-brand text-[2rem] md:text-[2.5rem] leading-tight font-semibold text-[#0F1C2C]">
          Analyzing your policy…
        </h2>
        {filename && (
          <div className="mt-2 text-[.9rem] text-[#0F1C2C]/70">{filename}</div>
        )}
        <div className="mt-8 max-w-md mx-auto">
          {phases.map((p, i) => (
            <div key={i}
              className={`flex items-center gap-3 py-2 transition-opacity ${i < tick ? "opacity-100" : i === tick ? "opacity-80" : "opacity-30"}`}>
              <span className={`w-2 h-2 rounded-full ${i < tick ? "bg-[#19A078]" : i === tick ? "bg-[#3BE0AD] pulse-dot" : "bg-[#A8A8A8]"}`} />
              <span className="text-[.95rem] text-[#0F1C2C]">{p}</span>
            </div>
          ))}
        </div>
        <div className="mt-10 text-[.75rem] text-[#A8A8A8]">
          Average analysis time is 60–90 seconds. We'll email you the scorecard when it's ready.
        </div>
      </div>
    </div>
  );
}

// ============================================================
//  PATH B — SCORECARD

function StatusDot({ status }) {
  const map = { red: "🔴", yellow: "🟡", green: "🟢" };
  return <span className="mr-1.5">{map[status] || "•"}</span>;
}
function statusClass(status) {
  if (status === "red") return "status-cell-red";
  if (status === "yellow") return "status-cell-yellow";
  if (status === "green") return "status-cell-green";
  return "";
}

          Policy Analysis — {formData?.firstName ? `for ${formData.firstName}, ${formData.company}` : "your policy"}

              Book my 15-min call →

// ============================================================
//  MAIN APP — state machine routing between screens
// ============================================================
// ============================================================
//  QUIZ SIDEBAR (mhtml-derived left-rail checklist)
// ============================================================
function QuizSidebar({ currentStep, answers, onJump }) {
  const sections = [
    { step: 1, label: "Industry",      done: !!answers.industry },
    { step: 2, label: "Company",       done: !!answers.subVertical },
    { step: 3, label: "Size",          done: !!answers.size },
    { step: 4, label: "Team",          done: !!answers.headcount },
    { step: 5, label: "Profile",       done: !!(answers.profileFlags && answers.profileFlags.length) },
    { step: 6, label: "Coming up",     done: !!(answers.triggers && answers.triggers.length) },
    { step: 7, label: "Your info",     done: false },
  ];
  const completed = sections.filter(s => s.done && s.step !== currentStep).length;
  const pct = Math.round((completed / 7) * 100);
  return (
    <aside className="quiz-sidebar hidden md:block">
      <div className="quiz-sidebar-progress">
        <div className="flex justify-between text-[13px] text-[#6b7280] mb-2">
          <span>Progress</span>
          <span className="font-semibold text-[#3F4956]">{pct}%</span>
        </div>
        <div className="quiz-sidebar-rail">
          <div className="quiz-sidebar-fill" style={{ width: `${pct}%` }} />
        </div>
      </div>
      <nav>
        {sections.map(s => {
          const isCurrent = s.step === currentStep;
          const isDone = s.done && !isCurrent;
          // Allow jumping back to earlier completed steps; gateA (step 7) is reached after Q6 only
          const canJump = (s.step <= currentStep || isDone) && s.step <= 6;
          return (
            <button
              key={s.step}
              className={`quiz-sidebar-item ${isCurrent ? "is-current" : ""}`}
              disabled={!canJump || !onJump}
              onClick={() => canJump && onJump && onJump(s.step)}
            >
              <span className={`quiz-sidebar-circle ${isDone ? "is-done" : ""} ${isCurrent ? "is-current" : ""}`}>
                {isDone && (
                  <svg width="9" height="8" viewBox="0 0 11 9" fill="none" aria-hidden="true">
                    <path d="M1 4L4 7.5L10 1" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
                  </svg>
                )}
              </span>
              <span className="flex-1">{s.label}</span>
            </button>
          );
        })}
      </nav>
    </aside>
  );
}

function App() {
  // High-level route: landing | quiz | gateA | snapshot | gateB | upload | processing | scorecard | calendly
  const [route, setRoute] = useState("landing");
  const [quizStep, setQuizStep] = useState(1);
  const [answers, setAnswers] = useState({
    industry: "",
    subVertical: "",
    size: "",
    headcount: "",
    workforceFlags: [],
    profileFlags: [],
    triggers: [],
  });
  const [formData, setFormData] = useState(null);
  const [uploadedFile, setUploadedFile] = useState("");

  const setA = (patch) => setAnswers(a => ({ ...a, ...patch }));
  const toggleArr = (key, v) =>
    setAnswers(a => ({ ...a, [key]: a[key].includes(v) ? a[key].filter(x => x !== v) : [...a[key], v] }));

  const reset = () => {
    setRoute("landing");
    setQuizStep(1);
    setAnswers({ industry: "", subVertical: "", size: "", headcount: "", workforceFlags: [], profileFlags: [], triggers: [] });
    setFormData(null);
    setUploadedFile("");
  };

  const snapshot = useMemo(() => {
    if (!answers.industry || !answers.subVertical || !answers.size) return null;
    return computeSnapshot(answers);
  }, [answers]);

  const goCalendly = () => {
    window.open("https://calendly.com/vouch-advisor", "_blank", "noopener");
  };

  // QUIZ NAV
  const nextQuiz = () => setQuizStep(s => Math.min(6, s + 1));
  const backQuiz = () => {
    if (quizStep === 1) { setRoute("landing"); return; }
    setQuizStep(s => Math.max(1, s - 1));
  };
  const finishQuiz = () => setRoute("gateA");

  // ROUTES
  if (route === "landing") {
    return <Landing onPickUpload={() => setRoute("gateB")} onPickQuiz={() => { setRoute("quiz"); setQuizStep(1); }} />;
  }

  if (route === "quiz") {
    return (
      <div className="min-h-screen vouch-mesh flex flex-col">
        <VouchHeader
          onReset={reset}
          step={quizStep}
          totalSteps={6}
          onBack={backQuiz}
          hideProgress={true}
          formData={formData}
        />
        <div className="flex flex-1 min-h-0">
          <QuizSidebar
            currentStep={quizStep}
            answers={answers}
            onJump={(s) => setQuizStep(s)}
          />
          <div className="flex-1 min-w-0">
            {quizStep === 1 && (
              <Q1Industry value={answers.industry}
                onChange={v => setA({ industry: v, subVertical: "" })}
                onNext={nextQuiz} onBack={backQuiz} />
            )}
            {quizStep === 2 && (
              <Q2SubVertical industry={answers.industry} value={answers.subVertical}
                onChange={v => setA({ subVertical: v })}
                onNext={nextQuiz} onBack={backQuiz} />
            )}
            {quizStep === 3 && (
              <Q3Size industry={answers.industry} value={answers.size}
                onChange={v => setA({ size: v })}
                onNext={nextQuiz} onBack={backQuiz} />
            )}
            {quizStep === 4 && (
              <Q4People
                headcount={answers.headcount}
                workforceFlags={answers.workforceFlags}
                onChangeHeadcount={v => setA({ headcount: v })}
                onToggleFlag={v => toggleArr("workforceFlags", v)}
                onNext={nextQuiz} onBack={backQuiz} />
            )}
            {quizStep === 5 && (
              <Q5Profile values={answers.profileFlags}
                onToggle={v => toggleArr("profileFlags", v)}
                onNext={nextQuiz} onBack={backQuiz} />
            )}
            {quizStep === 6 && (
              <Q6Triggers industry={answers.industry} values={answers.triggers}
                onToggle={v => toggleArr("triggers", v)}
                onNext={finishQuiz} onBack={backQuiz} />
            )}
          </div>
        </div>
      </div>
    );
  }

  if (route === "gateA") {
    return <HubSpotGate ctx="A" onBack={() => { setRoute("quiz"); setQuizStep(6); }} onSubmit={(d) => { setFormData(d); setRoute("snapshot"); }} />;
  }

  if (route === "snapshot") {
    return <SnapshotPage
      snapshot={snapshot}
      answers={answers}
      formData={formData}
      onUpload={() => setRoute("upload")}
      onCalendly={goCalendly}
      onResend={() => alert("Prototype: would re-send the snapshot email via HubSpot transactional.")}
      onReset={reset}
    />;
  }

  if (route === "gateB") {
    return <HubSpotGate ctx="B" onBack={() => setRoute("landing")} onSubmit={(d) => { setFormData(d); setRoute("upload"); }} />;
  }

  if (route === "upload") {
    return <UploadScreen
      onUploaded={(name) => { setUploadedFile(name); setRoute("processing"); }}
      onBack={() => setRoute(formData ? (snapshot ? "snapshot" : "gateB") : "landing")}
      onReset={reset}
      formData={formData}
    />;
  }

  if (route === "processing") {
    return <ProcessingScreen filename={uploadedFile} onDone={() => setRoute("scorecard")} />;
  }

  if (route === "scorecard") {
    return <ScorecardPage data={DEMO_SCORECARD} formData={formData} onCalendly={goCalendly} onReset={reset} />;
  }

  return <Landing onPickUpload={() => setRoute("gateB")} onPickQuiz={() => { setRoute("quiz"); setQuizStep(1); }} />;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
